<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>E-commerce Dashboard</title>
</head>
<body>

  <header>
    <nav id="navegation">
      <div class="container">
      <h1 id="usuario-email"></h1>
      <p id="saldo-usuario"></p>
      <button class="log-out">Log Out</button>
      </div>

      <div class="total-carrinho">
        <h1 class="valorTotal">Total: 0R$</h1>
        <button class="carrinho_logo"><img src="assets/carrinho_logo.png" alt=""></button>
      </div>
    </nav>
  </header>

  <div id="modal-finalizar-compra">
    <div id="modal-overlay"></div>
    <div id="modal-conteudo">
      <div id="modal-header">
        <h2>Finalizar Compra</h2>
        <button id="fechar-modal">&times;</button>
      </div>
      <div id="modal-body">
        
        <label for="">Cupom: </label>
        <input class="cupom-zone" type="text">
        <button class="submit-cupom">Submit</button>
        <ul id="modal-itens"></ul>
      </div>
      <div id="modal-footer">
        <p>Total: <span id="modal-total">R$ 0,00</span></p>
        <button id="confirmar-compra">Confirmar Pedido</button>
      </div>
    </div>
  </div>

  <div id="popup-sucesso">
    <p>Compra realizada com sucesso!</p>
  </div>

  <main>
    <div id="vitrine-produtos">
    </div>
  </main>


  <div id="carrinho-sidebar">
    <div id="carrinho-header">
      <h2>Carrinho</h2>
      <button id="fechar-carrinho">&times;</button>
    </div>
    <div id="carrinho-itens"></div>
    <div id="carrinho-footer">
      <p>Total: <span id="carrinho-total">R$ 0,00</span></p>
      <button id="finalizar-compra">Finalizar Compra</button>
    </div>
  </div>

 
  <script src="js/carrinho.js"></script>
  <script src="js/wallet.js"></script>
  <script src="js/index.js"></script>
  <script src="js/produtos.js"></script>
  <script src="js/cupom.js"></script>
  
</body>
</html>
